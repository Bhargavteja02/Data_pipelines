name: dbt CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt Snowflake
        run: |
          pip install dbt-snowflake

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "flow_practice:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: snowflake" >> ~/.dbt/profiles.yml
          echo "      account: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}" >> ~/.dbt/profiles.yml
          echo "      user: ${{ secrets.DBT_SNOWFLAKE_USER }}" >> ~/.dbt/profiles.yml
          echo "      password: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}" >> ~/.dbt/profiles.yml
          echo "      role: ${{ secrets.DBT_SNOWFLAKE_ROLE }}" >> ~/.dbt/profiles.yml
          echo "      database: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}" >> ~/.dbt/profiles.yml
          echo "      warehouse: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}" >> ~/.dbt/profiles.yml
          echo "      schema: ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}" >> ~/.dbt/profiles.yml
          echo "      threads: 4" >> ~/.dbt/profiles.yml

      - name: dbt deps
        run: dbt deps

      - name: dbt build
        run: dbt build